name: ai-secretary-saas

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: ai-secretary-saas-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      VOICE_SERVICE_TOKEN: ${VOICE_SERVICE_TOKEN}
    networks:
      - default
      - coolify
    ports:
      - "14000:4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: ai-secretary-saas-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "18080:80"

networks:
  coolify:
    external: true
