name: ai-secretary-saas

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: ai-secretary-saas-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      VOICE_SERVICE_TOKEN: ${VOICE_SERVICE_TOKEN}
      MULENPAY_API_KEY: ${MULENPAY_API_KEY:-}
      MULENPAY_SECRET_KEY: ${MULENPAY_SECRET_KEY:-}
      MULENPAY_SHOP_ID: ${MULENPAY_SHOP_ID:-}
      MULENPAY_BASE_URL: ${MULENPAY_BASE_URL:-https://mulenpay.ru/api}
      MULENPAY_WEBSITE_URL: ${MULENPAY_WEBSITE_URL:-}
      MULENPAY_SIGN_WITH_UUID: ${MULENPAY_SIGN_WITH_UUID:-false}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_PROXY_URL: ${OPENAI_PROXY_URL:-}
      SOCKS_PROXY_URL: ${SOCKS_PROXY_URL:-}
      PROMPT_EDITOR_MODEL: ${PROMPT_EDITOR_MODEL:-gpt-4o-mini}
    networks:
      - default
      - coolify
    ports:
      - "14000:4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: ai-secretary-saas-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "18080:80"

networks:
  coolify:
    external: true
