name: ai-secretary-saas

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: ai-secretary-saas-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      PUBLIC_WEB_URL: ${PUBLIC_WEB_URL:-}
      VOICE_SERVICE_TOKEN: ${VOICE_SERVICE_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_PROXY_URL: ${OPENAI_PROXY_URL:-}
      SOCKS_PROXY_URL: ${SOCKS_PROXY_URL:-}
      PROMPT_EDITOR_MODEL: ${PROMPT_EDITOR_MODEL:-gpt-4o-mini}
      CALL_RECORDINGS_ROOT: ${CALL_RECORDINGS_ROOT:-/home/andrew/ai/records}
      PHONE_VERIFICATION_CALL_NUMBER: ${PHONE_VERIFICATION_CALL_NUMBER:-+79952225212}
      PHONE_VERIFICATION_TTL_SECONDS: ${PHONE_VERIFICATION_TTL_SECONDS:-300}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:-}
      GOOGLE_CALENDAR_SCOPES: ${GOOGLE_CALENDAR_SCOPES:-https://www.googleapis.com/auth/calendar https://www.googleapis.com/auth/userinfo.email}
    volumes:
      - /home/andrew/ai/records:/home/andrew/ai/records:ro
    networks:
      - default
      - coolify
    ports:
      - "14000:4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: ai-secretary-saas-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "18080:80"

networks:
  coolify:
    external: true
