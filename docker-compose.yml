name: ai-secretary

services:
  db:
    image: postgres:16-alpine
    container_name: ai-secretary-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_secretary
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_secretary"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5432:5432"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: ai-secretary-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ai_secretary?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-very-secret}
      CORS_ORIGIN: http://localhost:8080
      PUBLIC_WEB_URL: http://localhost:8080
      VOICE_SERVICE_TOKEN: ${VOICE_SERVICE_TOKEN:-local-voice-service-token-change-me}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_PROXY_URL: ${OPENAI_PROXY_URL:-}
      SOCKS_PROXY_URL: ${SOCKS_PROXY_URL:-}
      PROMPT_EDITOR_MODEL: ${PROMPT_EDITOR_MODEL:-gpt-4o-mini}
      CALL_RECORDINGS_ROOT: ${CALL_RECORDINGS_ROOT:-/home/andrew/ai/records}
      PHONE_VERIFICATION_CALL_NUMBER: ${PHONE_VERIFICATION_CALL_NUMBER:-+79952225212}
      PHONE_VERIFICATION_TTL_SECONDS: ${PHONE_VERIFICATION_TTL_SECONDS:-300}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:-http://localhost:8080/api/integrations/google/oauth/callback}
      GOOGLE_CALENDAR_SCOPES: ${GOOGLE_CALENDAR_SCOPES:-https://www.googleapis.com/auth/calendar https://www.googleapis.com/auth/userinfo.email}
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ""
    container_name: ai-secretary-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:80"

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: ai-secretary-pgadmin
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"

volumes:
  pg_data:
  pgadmin_data:
