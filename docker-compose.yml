name: ai-secretary

services:
  db:
    image: postgres:16-alpine
    container_name: ai-secretary-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_secretary
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_secretary"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5432:5432"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: ai-secretary-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ai_secretary?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-very-secret}
      CORS_ORIGIN: http://localhost:8080
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: http://localhost:4000
    container_name: ai-secretary-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:80"

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: ai-secretary-pgadmin
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"

volumes:
  pg_data:
  pgadmin_data:
